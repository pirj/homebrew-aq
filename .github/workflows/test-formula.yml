name: test-formula

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: brew install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: brew install (from checkout)
        # brew on Linux runners doesn't accept paths to `brew audit` anymore,
        # so the install is the audit equivalent for our purposes — any
        # formula-format issue stops the build here. Local audit (macOS dev
        # box) is still run on each formula change.
        run: brew install --verbose ./Formula/aq.rb

      - name: brew test
        run: brew test aq

      - name: aq on PATH + parses
        # Don't invoke `aq --version` or `aq --help`: both call detect_host
        # at script-load time, which requires /dev/kvm on Linux runners
        # (not available). Verifying installation + bash syntax is enough.
        run: |
          command -v aq
          bash -n "$(command -v aq)"
