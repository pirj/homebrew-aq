name: test-formula

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: brew install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: brew install (from tap)
        # setup-homebrew auto-registers this checkout as the pirj/aq tap
        # (because the repo name is homebrew-aq), so the formula is
        # available by tap-qualified name. Brew rejects raw paths now.
        run: brew install --verbose pirj/aq/aq

      - name: brew test
        run: brew test pirj/aq/aq

      - name: aq on PATH + parses
        # Don't invoke `aq --version` or `aq --help`: both call detect_host
        # at script-load time, which requires /dev/kvm on Linux runners
        # (not available). Verifying installation + bash syntax is enough.
        run: |
          command -v aq
          bash -n "$(command -v aq)"
